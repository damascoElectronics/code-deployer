# .gitlab-ci.yml
stages:
  - test

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375

# Test the Python scripts (using Docker runner)
test-python:
  stage: test
  image: python:3.9-slim
  script:
    - echo "Testing Python scripts..."
    - python -m py_compile local/log_processor/app.py
    - python -m py_compile remote/log_collector/app.py
    - echo "Python syntax check passed!"