# .gitlab-ci.yml
stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375

# Test the Python scripts
test-python:
  stage: test
  image: python:3.9-slim
  script:
    - echo "Testing Python scripts..."
    - python -m py_compile local/log_processor/app.py
    - python -m py_compile remote/log_collector/app.py
    - echo "Python syntax check passed!"

# Build log_processor for local (VM1)
build-log-processor:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  script:
    - echo "Building Log Processor..."
    - docker info
    - cd local/log_processor
    - docker build -t log_processor:latest .
    - docker images | grep log_processor
    - echo "Log Processor built successfully!"
  only:
    - main

# Build log_collector for remote (VM2) - just test build
build-log-collector:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  script:
    - echo "Testing Log Collector build..."
    - docker info
    - cd remote/log_collector
    - docker build -t log_collector:latest .
    - echo "Log Collector builds successfully!"
  only:
    - main

# Deploy log_processor locally on VM1 using shell runner
deploy-local:
  stage: deploy
  script:
    - echo "Deploying Log Processor on local VM1..."
    - cd local
    - docker stop log_processor || true
    - docker rm log_processor || true
    - docker run -d --name log_processor --restart unless-stopped log_processor:latest
    - docker ps | grep log_processor
    - echo "Log Processor deployed on VM1!"
  tags:
    - shell
  only:
    - main
  when: manual

# Debug SSH variables
debug-ssh-vars:
  stage: test
  image: alpine:latest
  script:
    - echo "Checking CI/CD variables..."
    - |
      if [ -z "$SSH_PRIVATE_KEY" ]; then
        echo "ERROR: SSH_PRIVATE_KEY is not set in GitLab CI/CD variables!"
      else
        echo "SSH_PRIVATE_KEY is set (length: ${#SSH_PRIVATE_KEY} chars)"
      fi
    - |
      if [ -z "$VM2_IP" ]; then
        echo "ERROR: VM2_IP is not set in GitLab CI/CD variables!"
      else
        echo "VM2_IP is set to: $VM2_IP"
      fi
    - |
      if [ -z "$SSH_USER" ]; then
        echo "ERROR: SSH_USER is not set in GitLab CI/CD variables!"
      else
        echo "SSH_USER is set to: $SSH_USER"
      fi
  when: manual

# Test SSH connection to remote VM2 (using shell runner with VPN access)
test-remote-connection:
  stage: test
  script:
    - echo "Testing connection to VM2 at $VM2_IP as user $SSH_USER..."
    - |
      # Use existing SSH key from host
      ssh -o StrictHostKeyChecking=no $SSH_USER@$VM2_IP "echo 'Successfully connected to VM2' && docker --version"
  tags:
    - shell
    - vpn
  when: manual
  only:
    - main

test-shell-runner:
  stage: test
  script:
    - echo "Shell runner is working!"
    - whoami
    - pwd
  tags:
    - shell
  when: manual

# Deploy log_collector to remote VM2 (using shell runner with VPN access)
deploy-remote:
  stage: deploy
  script:
    - echo "Deploying Log Collector to remote VM2..."
    - |
      # Copy source files using host's SSH access
      scp -o StrictHostKeyChecking=no -r remote/log_collector $SSH_USER@$VM2_IP:/tmp/
      
      # Build and run on VM2
      ssh -o StrictHostKeyChecking=no $SSH_USER@$VM2_IP << 'EOF'
        echo "Building Docker image on VM2..."
        cd /tmp/log_collector
        docker build -t log_collector:latest .
        docker stop log_collector || true
        docker rm log_collector || true
        docker run -d --name log_collector --restart unless-stopped log_collector:latest
        docker ps | grep log_collector
        rm -rf /tmp/log_collector
        echo "Log Collector deployed on VM2!"
      EOF
  tags:
    - shell
    - vpn
  only:
    - main
  when: manual