# .gitlab-ci.yml
stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

# Test the Python scripts
test-python:
  stage: test
  image: python:3.9-slim
  script:
    - echo "Testing Python scripts..."
    - python -m py_compile local/log_processor/app.py
    - python -m py_compile remote/log_collector/app.py
    - echo "✓ Python syntax check passed"

# Build log_processor for local (VM1)
build-log-processor:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Building Log Processor..."
    - cd local/log_processor
    - docker build -t log_processor:latest .
    - docker images | grep log_processor
    - echo "✓ Log Processor built successfully"
  only:
    - main

# Build log_collector for remote (VM2)
build-log-collector:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Building Log Collector..."
    - cd remote/log_collector
    - docker build -t log_collector:latest .
    - docker save log_collector:latest -o log_collector.tar
    - echo "✓ Log Collector built and saved"
  artifacts:
    paths:
      - remote/log_collector/log_collector.tar
    expire_in: 1 hour
  only:
    - main

# Deploy log_processor locally on VM1
deploy-local:
  stage: deploy
  image: docker:latest
  script:
    - echo "Deploying Log Processor on local VM1..."
    - cd local
    - docker stop log_processor || true
    - docker rm log_processor || true
    - docker run -d --name log_processor --restart unless-stopped log_processor:latest
    - docker ps | grep log_processor
    - echo "✓ Log Processor deployed on VM1"
  only:
    - main
  when: manual

# Test SSH connection to remote VM2
test-remote-connection:
  stage: test
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
  script:
    - echo "Testing connection to remote VM2..."
    - ssh -o StrictHostKeyChecking=no $SSH_USER@$VM2_IP "echo '✓ Successfully connected to VM2' && docker --version"
  when: manual
  only:
    - main

# Deploy log_collector to remote VM2
deploy-remote:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build-log-collector
  before_script:
    - apk add --no-cache openssh-client
  script:
    - echo "Deploying Log Collector to remote VM2..."
    - scp -o StrictHostKeyChecking=no remote/log_collector/log_collector.tar $SSH_USER@$VM2_IP:/tmp/
    - |
      ssh -o StrictHostKeyChecking=no $SSH_USER@$VM2_IP << 'EOF'
        echo "Loading Docker image..."
        docker load -i /tmp/log_collector.tar
        docker stop log_collector || true
        docker rm log_collector || true
        docker run -d --name log_collector --restart unless-stopped log_collector:latest
        docker ps | grep log_collector
        rm /tmp/log_collector.tar
        echo "✓ Log Collector deployed on VM2"
      EOF
  only:
    - main
  when: manual