# .gitlab-ci.yml
stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375

# Test the Python scripts
test-python:
  stage: test
  image: python:3.9-slim
  script:
    - echo "Testing Python scripts..."
    - python -m py_compile local/log_processor/app.py
    - python -m py_compile remote/log_collector/app.py
    - echo "Python syntax check passed!"

# Build log_processor for local (VM1)
build-log-processor:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  script:
    - echo "Building Log Processor..."
    - docker info
    - cd local/log_processor
    - docker build -t log_processor:latest .
    - docker images | grep log_processor
    - echo "Log Processor built successfully!"
  only:
    - main

# Build log_collector for remote (VM2) - just test build
build-log-collector:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  script:
    - echo "Testing Log Collector build..."
    - docker info
    - cd remote/log_collector
    - docker build -t log_collector:latest .
    - echo "Log Collector builds successfully!"
  only:
    - main

# Alternative: Build using mounted docker socket (if dind doesn't work)
build-log-processor-alt:
  stage: build
  image: docker:latest
  script:
    - echo "Building Log Processor (using host Docker)..."
    - cd local/log_processor
    - docker build -t log_processor:latest .
    - echo "Log Processor built!"
  tags:
    - shell
  when: manual

# Deploy log_processor locally on VM1
deploy-local:
  stage: deploy
  image: docker:latest
  script:
    - echo "Deploying Log Processor on local VM1..."
    - docker stop log_processor || true
    - docker rm log_processor || true
    - docker run -d --name log_processor --restart unless-stopped log_processor:latest
    - docker ps | grep log_processor
    - echo "Log Processor deployed on VM1!"
  tags:
    - shell
  only:
    - main
  when: manual

# Test SSH connection to remote VM2
test-remote-connection:
  stage: test
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $VM2_IP >> ~/.ssh/known_hosts
  script:
    - echo "Testing connection to remote VM2..."
    - ssh -i ~/.ssh/id_rsa $SSH_USER@$VM2_IP "echo 'Successfully connected to VM2' && docker --version"
  when: manual
  only:
    - main

# Deploy log_collector to remote VM2
deploy-remote:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client git
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $VM2_IP >> ~/.ssh/known_hosts
  script:
    - echo "Deploying Log Collector to remote VM2..."
    - |
      # Copy the source files to VM2
      scp -i ~/.ssh/id_rsa -r remote/log_collector $SSH_USER@$VM2_IP:/tmp/
      
      # Build and run on VM2
      ssh -i ~/.ssh/id_rsa $SSH_USER@$VM2_IP << 'EOF'
        echo "Building Docker image on VM2..."
        cd /tmp/log_collector
        docker build -t log_collector:latest .
        docker stop log_collector || true
        docker rm log_collector || true
        docker run -d --name log_collector --restart unless-stopped log_collector:latest
        docker ps | grep log_collector
        rm -rf /tmp/log_collector
        echo "Log Collector deployed on VM2!"
      EOF
  only:
    - main
  when: manual